<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Encyclopaedia Metallum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#2b2b2b;font-family:Georgia,serif;color:#ddd;max-width:480px;margin:0 auto}
.ma-header{background:#1a1a1a;border-bottom:2px solid #8b0000;padding:10px 12px}
.ma-logo-text{font-size:20px;font-weight:700;color:#fff;letter-spacing:0.5px}
.ma-logo-sub{font-size:11px;color:#888;font-family:Arial,sans-serif;margin-bottom:8px}
.ma-nav{display:flex;gap:4px;border-top:1px solid #333;padding-top:8px}
.ma-nav-btn{background:none;border:1px solid #444;color:#aaa;font-size:12px;padding:6px 10px;cursor:pointer;font-family:Arial,sans-serif;border-radius:2px;flex:1}
.ma-nav-btn.active{background:#8b0000;color:#fff;border-color:#8b0000}
.search-bar{background:#222;padding:10px 12px;border-bottom:1px solid #333;display:flex;gap:6px}
.search-bar input{flex:1;background:#111;border:1px solid #444;color:#ddd;padding:8px 10px;font-size:14px;font-family:Arial,sans-serif;outline:none;border-radius:2px}
.search-bar input:focus{border-color:#8b0000}
.search-bar button{background:#8b0000;border:none;color:#fff;padding:8px 14px;font-size:13px;cursor:pointer;font-family:Arial,sans-serif;border-radius:2px}
.section-header{background:#111;border-bottom:1px solid #8b0000;padding:6px 12px;font-size:12px;color:#aaa;font-family:Arial,sans-serif}
.results-table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;font-size:13px}
.results-table th{background:#111;color:#888;padding:7px 10px;text-align:left;font-size:11px;border-bottom:1px solid #333;font-weight:400;text-transform:uppercase;letter-spacing:0.5px}
.results-table td{padding:8px 10px;border-bottom:1px solid #2a2a2a;vertical-align:top}
.results-table tr:hover td{background:#1f1f1f}
.band-link{color:#cc3333;cursor:pointer;font-weight:700;font-size:13px}
.country-text{color:#888;font-size:12px}
.genre-text{color:#aaa;font-size:12px}
.status-active{color:#4a9c4a;font-size:11px;font-weight:700}
.status-split{color:#cc6600;font-size:11px;font-weight:700}
.status-other{color:#888;font-size:11px}
.spinner-wrap{padding:30px;text-align:center;font-family:Arial,sans-serif;font-size:13px;color:#666}
.spinner{display:inline-block;width:22px;height:22px;border:2px solid #333;border-top-color:#8b0000;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes
